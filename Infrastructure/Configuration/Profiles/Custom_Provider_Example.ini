[Profile]
Name=Custom Provider Example
Description=Example custom profile showing how to configure for a specific provider
IsCustom=true

[Connection]  
RegistrationExpiry=600
RequireKeepAlive=true
KeepAliveInterval=60
Transport=TCP
DefaultPort=5060

[Protocol]
UserAgentString=Windows-SIP-Phone/2.0 (CustomProvider)
UseShortHeaders=false
SendPreciseTimers=true

[Media]
PreferredCodecs=G722,PCMU,PCMA,G729
RequireSTUN=true
STUNServer=stun.provider.com

[CustomHeaders]
Header_X-Provider-Client=WindowsSipPhone
Header_X-Provider-Version=2.0
Header_X-Custom-ID=MyCustomID